<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOSAVA — A Small Clay Story (Stop Motion)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;
    --ink:#221D18;
    --clay:#B5663F;
    --clay-dark:#94502E;
    --clay-light:#C97D52;
    --glaze:#C8571C;
    --glaze-hi:#E8915B;
    --grey:#E9E5E0;
    --grey-2:#D7D2CB;
    --orange:#C8571C;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;overflow-x:hidden}
  ::selection{background:var(--orange);color:#fff}

  nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;justify-content:space-between;align-items:center;
    padding:1.4rem clamp(1.4rem,4vw,3rem);
  }
  nav .logo{font-family:'Fraunces',serif;font-weight:500;font-size:1.15rem;letter-spacing:.4em;text-indent:.4em;color:var(--ink);text-decoration:none}
  nav .tag{font-size:.66rem;letter-spacing:.3em;text-transform:uppercase;color:#9b938a}

  #stage{height:100vh;width:100%;position:relative;overflow:hidden}
  #stage svg{position:absolute;inset:0;width:100%;height:100%}

  .title-card{
    position:absolute;top:24%;left:0;right:0;text-align:center;z-index:5;pointer-events:none;
  }
  .title-card h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(2.6rem,6vw,4.6rem);letter-spacing:.1em}
  .title-card p{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(1rem,1.8vw,1.3rem);color:#8c8378;margin-top:.7rem}
  .cue{
    position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);z-index:5;
    display:flex;flex-direction:column;align-items:center;gap:.6rem;pointer-events:none;
  }
  .cue span{font-size:.62rem;letter-spacing:.38em;text-transform:uppercase;color:#9b938a}
  .cue .ball{width:9px;height:9px;border-radius:50%;background:var(--orange);animation:hopcue 1.1s steps(6) infinite}
  @keyframes hopcue{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

  .stage-label{
    position:absolute;bottom:2.6rem;left:50%;transform:translateX(-50%);z-index:5;
    font-size:.72rem;font-weight:600;letter-spacing:.5em;text-transform:uppercase;
    color:var(--orange);opacity:0;pointer-events:none;
  }

  .cta-card{
    position:absolute;top:16%;left:0;right:0;text-align:center;z-index:5;opacity:0;pointer-events:none;
  }
  .cta-card h2{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(1.9rem,4vw,3.2rem)}
  .cta-card .row{display:flex;gap:.9rem;justify-content:center;margin-top:1.6rem;pointer-events:auto}
  .btn{
    display:inline-block;text-decoration:none;font-size:.7rem;font-weight:600;
    letter-spacing:.24em;text-transform:uppercase;padding:1rem 2.1rem;
    transition:all .3s;
  }
  .btn-solid{background:var(--orange);color:#fff}
  .btn-solid:hover{background:#A84614}
  .btn-ghost{border:1px solid var(--ink);color:var(--ink)}
  .btn-ghost:hover{background:var(--ink);color:#fff}

  .hint{
    position:fixed;bottom:1.1rem;right:1.3rem;z-index:50;
    font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#b9b2a9;
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">KOSAVA</a>
  <span class="tag">stop-motion study</span>
</nav>

<div id="stage">
  <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" aria-label="A lump of clay becomes a bowl">
    <!-- ground shadow -->
    <ellipse id="shadow" cx="600" cy="520" rx="95" ry="14" fill="#000" opacity="0.07"/>

    <!-- potter's wheel -->
    <g id="wheel" transform="translate(600,1050)">
      <rect x="-14" y="28" width="28" height="46" rx="6" fill="#C9C2B9"/>
      <ellipse cx="0" cy="22" rx="150" ry="30" fill="#857A6E"/>
      <ellipse cx="0" cy="14" rx="150" ry="30" fill="#A99C8D"/>
      <ellipse cx="0" cy="14" rx="100" ry="19" fill="none" stroke="#8F8375" stroke-width="2" opacity=".5"/>
      <ellipse cx="0" cy="14" rx="55" ry="10" fill="none" stroke="#8F8375" stroke-width="2" opacity=".5"/>
      <g id="spinLines" opacity="0">
        <path d="M -190 10 A 195 38 0 0 1 -120 -22" fill="none" stroke="#C8571C" stroke-width="5" stroke-linecap="round"/>
        <path d="M 190 18 A 195 38 0 0 0 130 44" fill="none" stroke="#C8571C" stroke-width="5" stroke-linecap="round"/>
      </g>
    </g>

    <!-- kiln -->
    <g id="kiln" transform="translate(1650,430)">
      <rect x="-130" y="-150" width="260" height="290" rx="26" fill="#D8CFC4"/>
      <rect x="-130" y="96" width="260" height="44" rx="14" fill="#BFB4A6"/>
      <rect x="-26" y="-208" width="52" height="70" rx="10" fill="#BFB4A6"/>
      <g id="smoke" opacity="0">
        <circle cx="0" cy="-238" r="13" fill="#E5E0DA"/>
        <circle cx="18" cy="-266" r="17" fill="#ECE8E3"/>
        <circle cx="-6" cy="-296" r="21" fill="#F2EFEB"/>
      </g>
      <circle id="kilnWindowGlow" cx="0" cy="-30" r="58" fill="#FF9C3F" opacity="0"/>
      <circle cx="0" cy="-30" r="44" fill="#3E3730"/>
      <circle id="kilnFire" cx="0" cy="-30" r="36" fill="#FF7A1A" opacity="0"/>
      <circle cx="0" cy="-30" r="44" fill="none" stroke="#A99C8D" stroke-width="8"/>
      <!-- door -->
      <g id="kilnDoor" transform="translate(0,0)">
        <rect x="-92" y="22" width="184" height="104" rx="14" fill="#8F8375"/>
        <rect x="-92" y="22" width="184" height="104" rx="14" fill="none" stroke="#776C5F" stroke-width="5"/>
        <circle cx="64" cy="74" r="8" fill="#5D544A"/>
      </g>
      <rect id="kilnMouth" x="-92" y="22" width="184" height="104" rx="14" fill="#2A241E" opacity="0"/>
      <!-- thermometer -->
      <g transform="translate(152,-92)">
        <rect x="-7" y="0" width="14" height="120" rx="7" fill="#EAE4DC"/>
        <rect id="thermo" x="-7" y="116" width="14" height="4" rx="2" fill="#C8571C"/>
        <circle cx="0" cy="128" r="14" fill="#C8571C"/>
      </g>
    </g>

    <!-- trimming tool -->
    <g id="tool" transform="translate(1400,260) rotate(18)" opacity="0">
      <rect x="-6" y="-110" width="12" height="150" rx="6" fill="#9C6B4A"/>
      <path d="M -16 40 L 16 40 L 8 86 L -8 86 Z" fill="#6E665C"/>
    </g>

    <!-- THE CLAY -->
    <g id="clayG" transform="translate(600,430)">
      <g id="jitterG">
        <!-- ball -->
        <path id="shBall" fill="#B5663F" d="M -78 6 C -84 -38 -52 -76 -6 -80 C 44 -84 82 -52 84 -8 C 86 36 56 76 6 80 C -42 84 -72 48 -78 6 Z"/>
        <path id="shBallTx" fill="#94502E" opacity=".5" d="M -30 -34 C -18 -44 4 -46 14 -36 C 4 -28 -16 -26 -30 -34 Z M 26 22 C 38 16 52 20 56 30 C 46 38 30 34 26 22 Z"/>
        <!-- pancake -->
        <g id="shPancake" opacity="0">
          <ellipse cx="0" cy="56" rx="112" ry="30" fill="#B5663F"/>
          <ellipse cx="0" cy="46" rx="112" ry="28" fill="#C97D52"/>
        </g>
        <!-- coils -->
        <g id="coil1" opacity="0"><ellipse cx="0" cy="30" rx="96" ry="26" fill="#B5663F"/><ellipse cx="0" cy="22" rx="96" ry="24" fill="#C97D52"/></g>
        <g id="coil2" opacity="0"><ellipse cx="0" cy="-8" rx="90" ry="24" fill="#B5663F"/><ellipse cx="0" cy="-15" rx="90" ry="22" fill="#C97D52"/></g>
        <g id="coil3" opacity="0"><ellipse cx="0" cy="-42" rx="84" ry="22" fill="#B5663F"/><ellipse cx="0" cy="-48" rx="84" ry="20" fill="#C97D52"/></g>
        <!-- rough pinch pot -->
        <g id="shRough" opacity="0">
          <path fill="#B5663F" d="M -92 -38 C -98 6 -88 52 -54 66 C -22 78 26 78 56 64 C 88 50 96 4 90 -40 C 76 -30 40 -24 0 -24 C -42 -24 -78 -30 -92 -38 Z"/>
          <ellipse cx="-1" cy="-36" rx="91" ry="20" fill="#94502E"/>
          <path fill="none" stroke="#94502E" stroke-width="4" opacity=".45" d="M -78 8 C -50 18 50 18 80 6 M -68 34 C -40 44 42 44 70 32"/>
        </g>
        <!-- smooth thrown bowl -->
        <g id="shSmooth" opacity="0">
          <path fill="#B5663F" d="M -96 -34 C -98 10 -84 54 -46 66 C -16 75 18 75 48 65 C 86 52 98 8 96 -34 C 78 -22 42 -16 0 -16 C -40 -16 -78 -22 -96 -34 Z"/>
          <ellipse cx="0" cy="-32" rx="96" ry="20" fill="#94502E"/>
          <path fill="none" stroke="#C97D52" stroke-width="3.5" opacity=".7" d="M -84 6 C -50 16 52 16 84 4 M -72 30 C -44 40 46 40 72 28"/>
        </g>
        <!-- trimmed bowl -->
        <g id="shTrim" opacity="0">
          <path fill="#B5663F" d="M -94 -36 C -94 8 -82 48 -48 60 C -18 69 20 69 48 59 C 82 46 94 6 94 -36 C 76 -24 42 -18 0 -18 C -40 -18 -76 -24 -94 -36 Z"/>
          <ellipse cx="0" cy="-34" rx="94" ry="19" fill="#94502E"/>
          <rect x="-30" y="58" width="60" height="14" rx="6" fill="#94502E"/>
        </g>
        <!-- glazed bowl -->
        <g id="shGlaze" opacity="0">
          <path fill="#C8571C" d="M -94 -36 C -94 8 -82 48 -48 60 C -18 69 20 69 48 59 C 82 46 94 6 94 -36 C 76 -24 42 -18 0 -18 C -40 -18 -76 -24 -94 -36 Z"/>
          <ellipse cx="0" cy="-34" rx="94" ry="19" fill="#8A3A0F"/>
          <path fill="#E8915B" d="M -80 -28 C -78 -10 -74 8 -66 22 C -72 4 -75 -14 -74 -30 Z"/>
          <path fill="#8A3A0F" opacity=".85" d="M -52 -22 C -50 -2 -54 6 -47 7 C -41 6 -44 -4 -43 -21 Z M 6 -18 C 8 4 3 14 10 15 C 17 14 13 2 15 -18 Z M 58 -22 C 60 -6 56 2 62 3 C 68 2 65 -8 66 -23 Z"/>
          <ellipse id="glazeShine" cx="-38" cy="-2" rx="16" ry="30" fill="#FFFFFF" opacity=".35" transform="rotate(18 -38 -2)"/>
        </g>
      </g>
    </g>

    <!-- droplets -->
    <g id="drops" opacity="0">
      <circle cx="0" cy="0" r="7" fill="#C97D52"/>
      <circle cx="0" cy="0" r="5" fill="#B5663F"/>
      <circle cx="0" cy="0" r="6" fill="#C97D52"/>
      <circle cx="0" cy="0" r="4" fill="#B5663F"/>
    </g>
    <!-- trim curls -->
    <g id="curls" opacity="0">
      <path d="M0 0 q 14 -4 12 10 q -2 12 -14 8 q -9 -3 -4 -12" fill="none" stroke="#B5663F" stroke-width="7" stroke-linecap="round"/>
      <path d="M0 0 q 14 -4 12 10 q -2 12 -14 8 q -9 -3 -4 -12" fill="none" stroke="#94502E" stroke-width="6" stroke-linecap="round"/>
      <path d="M0 0 q 14 -4 12 10 q -2 12 -14 8 q -9 -3 -4 -12" fill="none" stroke="#B5663F" stroke-width="6" stroke-linecap="round"/>
    </g>
    <!-- sparkles -->
    <g id="sparkles" opacity="0">
      <path d="M0 -14 L3 -3 L14 0 L3 3 L0 14 L-3 3 L-14 0 L-3 -3 Z" fill="#FFB35C"/>
      <path d="M0 -10 L2.2 -2.2 L10 0 L2.2 2.2 L0 10 L-2.2 2.2 L-10 0 L-2.2 -2.2 Z" fill="#C8571C"/>
      <path d="M0 -8 L1.8 -1.8 L8 0 L1.8 1.8 L0 8 L-1.8 1.8 L-8 0 L-1.8 -1.8 Z" fill="#FFD9A8"/>
    </g>
  </svg>

  <div class="title-card" id="titleCard">
    <h1>KOSAVA</h1>
    <p>a small clay story — scroll slowly</p>
  </div>
  <div class="cue" id="cue"><span>scroll</span><div class="ball"></div></div>

  <div class="stage-label" id="label"></div>

  <div class="cta-card" id="ctaCard">
    <h2>From lump to legend.</h2>
    <div class="row">
      <a class="btn btn-solid" href="#store">Visit the Store</a>
      <a class="btn btn-ghost" href="#classes">Join a Class</a>
    </div>
  </div>
</div>

<div class="hint">click the clay · it likes it</div>

<script src="assets/js/gsap.min.js"></script>
<script src="assets/js/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

const $ = id => document.getElementById(id);
const clay = $('clayG'), jit = $('jitterG');
const SHAPES = ['shBall','shPancake','shRough','shSmooth','shTrim','shGlaze'];

function showShape(name){
  SHAPES.forEach(s => gsap.set($(s), { opacity: s === name ? 1 : 0 }));
  gsap.set($('shBallTx'), { opacity: name === 'shBall' ? .5 : 0 });
}

/* ---------- master timeline (scrubbed + quantized = stop motion) ---------- */
const tl = gsap.timeline({ paused: true, defaults: { ease: 'none' } });

const POP = .01; /* instant pops, claymation style */

/* helper: hop the clay to x,y */
function hop(t, x, y, d = 1.6, h = 130){
  /* gsap x/y are ABSOLUTE for transformed SVG groups */
  tl.to(clay, { x: x, duration: d }, t)
    .to(clay, { y: y - h, duration: d * .5, ease: 'power2.out' }, t)
    .to(clay, { y: y, duration: d * .5, ease: 'power2.in' }, t + d * .5)
    .to(jit, { scaleY: .82, scaleX: 1.16, duration: .18, transformOrigin: '50% 100%' }, t + d)
    .to(jit, { scaleY: 1, scaleX: 1, duration: .3 }, t + d + .18)
    .to($('shadow'), { x: x - 600, duration: d }, t)
    .to($('shadow'), { attr: { ry: 6 }, opacity: .03, duration: d * .5 }, t)
    .to($('shadow'), { attr: { ry: 14 }, opacity: .07, duration: d * .5 }, t + d * .5);
}
function label(t, txt){
  tl.set($('label'), { textContent: txt, opacity: 0 }, t)
    .to($('label'), { opacity: 1, duration: .25 }, t + .05);
}
function labelOut(t){ tl.to($('label'), { opacity: 0, duration: .2 }, t); }

/* ============ S0: hero (0–6) ============ */
tl.to(jit, { rotation: 3, duration: 1.5 }, 0)
  .to(jit, { rotation: -3, duration: 1.5 }, 1.5)
  .to(jit, { rotation: 0, duration: 1 }, 3)
  .to($('titleCard'), { opacity: 0, y: -30, duration: 1.2 }, 4.2)
  .to($('cue'), { opacity: 0, duration: .8 }, 4.2);

/* ============ S1: pinch / hand build (6–16) ============ */
label(6.2, 'pinch');
hop(6.2, 380, 430);
/* squash into pancake */
tl.to(jit, { scaleY: .55, scaleX: 1.35, duration: .8, transformOrigin: '50% 100%' }, 8.4)
  .set($('shBall'), { opacity: 0 }, 9.2).set($('shBallTx'), { opacity: 0 }, 9.2)
  .set($('shPancake'), { opacity: 1 }, 9.2)
  .set(jit, { scaleX: 1, scaleY: 1 }, 9.2);
/* coils drop in */
[['coil1',10.0],['coil2',10.9],['coil3',11.8]].forEach(([c,t])=>{
  tl.set($(c), { opacity: 1, y: -260 }, t)
    .to($(c), { y: 0, duration: .55, ease: 'power2.in' }, t)
    .to($(c), { scaleY: .8, duration: .12, transformOrigin: '50% 100%' }, t + .55)
    .to($(c), { scaleY: 1, duration: .2 }, t + .67);
});
/* merge pop into rough pot */
tl.to(jit, { scaleX: 1.08, scaleY: .92, duration: .3 }, 13.0)
  .set(['#shPancake','#coil1','#coil2','#coil3'].join(','), { opacity: 0 }, 13.3)
  .set($('shRough'), { opacity: 1 }, 13.3)
  .set(jit, { scaleX: 1, scaleY: 1 }, 13.3)
  .to(jit, { rotation: -4, duration: .3 }, 13.4).to(jit, { rotation: 0, duration: .4 }, 13.7);
labelOut(15);

/* ============ S2: throw (16–26) ============ */
label(16.2, 'throw');
tl.to($('wheel'), { y: 560, duration: 1.4, ease: 'power2.out' }, 16.2); /* wheel rises */
hop(17.8, 600, 470, 1.4);
/* spin: wobble rotation + speed lines + droplets */
tl.set($('spinLines'), { opacity: 1 }, 19.4)
  .to($('spinLines'), { rotation: 360, transformOrigin: '0 14', duration: 3.4 }, 19.4)
  .to(jit, { rotation: 2.5, duration: .4, yoyo: true, repeat: 5 }, 19.4);
/* droplets fly */
const dropEls = $('drops').children;
tl.set($('drops'), { opacity: 1 }, 19.8);
[[0,-160,-120],[1,150,-140],[2,-180,-40],[3,170,-60]].forEach(([i,dx,dy],k)=>{
  const el = dropEls[i], t0 = 19.8 + k*.5;
  tl.set(el, { x: 600, y: 470 }, t0)
    .to(el, { x: 600+dx, duration: 1 }, t0)
    .to(el, { y: 470+dy, duration: .5, ease: 'power2.out' }, t0)
    .to(el, { y: 620, duration: .5, ease: 'power2.in', opacity: 0 }, t0+.5)
    .set(el, { opacity: 1 }, t0+1.05);
});
tl.set($('shRough'), { opacity: 0 }, 21.4).set($('shSmooth'), { opacity: 1 }, 21.4)
  .to(jit, { scaleY: 1.06, duration: .3, yoyo: true, repeat: 1, transformOrigin: '50% 100%' }, 21.5)
  .set($('drops'), { opacity: 0 }, 23.2)
  .to($('spinLines'), { opacity: 0, duration: .3 }, 22.8);
labelOut(25);

/* ============ S3: trim (26–34) ============ */
label(26.2, 'trim');
tl.set($('tool'), { opacity: 1 }, 26.4)
  .to($('tool'), { x: 750, y: 320, duration: 1.2, ease: 'power2.out' }, 26.4) /* tip touches bowl */
  .to($('tool'), { rotation: 24, duration: .3, yoyo: true, repeat: 3 }, 27.6);
const curlEls = $('curls').children;
tl.set($('curls'), { opacity: 1 }, 27.8);
[[0,80],[1,110],[2,95]].forEach(([i,dx],k)=>{
  const el = curlEls[i], t0 = 27.8 + k*.7;
  tl.set(el, { x: 690, y: 430, rotation: 0 }, t0)
    .to(el, { x: 690+dx, rotation: 220, duration: .9 }, t0)
    .to(el, { y: 380, duration: .4, ease: 'power2.out' }, t0)
    .to(el, { y: 600, duration: .5, ease: 'power2.in' }, t0+.4)
    .to(el, { opacity: 0, duration: .1 }, t0+.85)
    .set(el, { opacity: 1 }, t0+1);
});
tl.set($('curls'), { opacity: 0 }, 30.5)
  .set($('shSmooth'), { opacity: 0 }, 29.6).set($('shTrim'), { opacity: 1 }, 29.6)
  .to($('tool'), { x: 1450, y: 200, opacity: 0, duration: .8, ease: 'power2.in' }, 30.6);
/* wheel sinks away */
tl.to($('wheel'), { y: 1050, duration: 1.2, ease: 'power2.in' }, 31.6);
labelOut(33);

/* ============ S4: fire / kiln (34–50) ============ */
label(34.2, 'fire');
tl.to($('kiln'), { x: 800, duration: 1.6, ease: 'power3.out' }, 34.2); /* kiln slides in */
/* door opens (slides down a bit) */
tl.to($('kilnDoor'), { y: 86, duration: .7 }, 36.0)
  .set($('kilnMouth'), { opacity: 1 }, 36.0);
/* bowl hops into kiln */
hop(36.6, 800, 500, 1.6);
tl.to(clay, { opacity: 0, duration: .15 }, 38.3)
  .to($('shadow'), { opacity: 0, duration: .15 }, 38.3);
/* door closes */
tl.to($('kilnDoor'), { y: 0, duration: .6 }, 38.6)
  .set($('kilnMouth'), { opacity: 0 }, 39.2);
/* firing: glow pulses, thermometer rises, kiln shakes, smoke */
tl.set($('kilnFire'), { opacity: 1 }, 39.4)
  .to($('kilnFire'), { opacity: .4, duration: .35, yoyo: true, repeat: 9 }, 39.4)
  .to($('kilnWindowGlow'), { opacity: .5, duration: .4, yoyo: true, repeat: 8 }, 39.6)
  .to($('thermo'), { attr: { y: 18, height: 102 }, duration: 4 }, 39.4)
  .to($('kiln'), { x: '-=4', duration: .12, yoyo: true, repeat: 16 }, 40.2)
  .set($('smoke'), { opacity: 1 }, 40.0)
  .to($('smoke'), { y: -36, duration: 3.4 }, 40.0)
  .to($('smoke'), { opacity: 0, duration: .5 }, 43.0);
/* ding! door opens, glazed bowl pops out */
tl.to($('kilnFire'), { opacity: 0, duration: .3 }, 43.8)
  .to($('kilnWindowGlow'), { opacity: 0, duration: .3 }, 43.8)
  .to($('kilnDoor'), { y: 86, duration: .6 }, 44.2)
  .set($('kilnMouth'), { opacity: 1 }, 44.2);
tl.set($('shTrim'), { opacity: 0 }, 44.8).set($('shGlaze'), { opacity: 1 }, 44.8)
  .set(clay, { opacity: 1, x: 800, y: 500 }, 44.8) /* at kiln mouth */
  .set($('shadow'), { opacity: .07, x: 200 }, 44.8);
hop(45.0, 600, 470, 1.6, 200);
/* sparkles */
const spk = $('sparkles').children;
tl.set($('sparkles'), { opacity: 1 }, 46.6);
[[0,-130,-90],[1,120,-120],[2,30,-170]].forEach(([i,dx,dy],k)=>{
  const el = spk[i], t0 = 46.6 + k*.3;
  tl.set(el, { x: 600+dx, y: 470+dy, scale: 0, transformOrigin:'center' }, t0)
    .to(el, { scale: 1.4, duration: .4 }, t0)
    .to(el, { scale: 0, rotation: 90, duration: .4 }, t0+.4);
});
tl.set($('sparkles'), { opacity: 0 }, 48.4);
/* kiln leaves */
tl.to($('kiln'), { x: 1650, duration: 1.4, ease: 'power2.in' }, 46.4);
labelOut(48.5);

/* ============ S5: finale (50–56) ============ */
tl.to(clay, { y: 520, duration: 1.2, ease: 'power2.inOut' }, 50)
  .to($('shadow'), { y: 90, duration: 1.2, ease: 'power2.inOut' }, 50)
  .to($('glazeShine'), { opacity: .7, duration: .4, yoyo: true, repeat: 1 }, 51.4)
  .to($('ctaCard'), { opacity: 1, duration: 1.2 }, 51.8)
  .set($('ctaCard'), { pointerEvents: 'auto' }, 51.8);
tl.to({}, { duration: 2 }, 54); /* tail padding */

/* ---------- scroll driver with stop-motion quantization ---------- */
const FRAMES = 132;
let lastQ = -1;
function rand(n){ const x = Math.sin(n * 127.1) * 43758.5453; return x - Math.floor(x); }

ScrollTrigger.create({
  trigger: '#stage',
  start: 'top top',
  end: '+=520%',
  pin: true,
  scrub: 0.35,
  onUpdate(self){
    const q = Math.round(self.progress * FRAMES) / FRAMES;
    if (q === lastQ) return;
    lastQ = q;
    tl.progress(q);
    /* claymation jitter — every frame the clay sits slightly differently */
    const f = q * FRAMES;
    gsap.set(jit, {
      x: (rand(f) - .5) * 3.4,
      y: (rand(f + 9) - .5) * 3.4,
      rotation: '+=' + ((rand(f + 33) - .5) * 1.6)
    });
  }
});

/* ---------- interactivity ---------- */
/* click the clay = boing */
let boinging = false;
$('stage').addEventListener('pointerdown', e => {
  if (boinging) return;
  boinging = true;
  gsap.timeline({ onComplete: () => boinging = false })
    .to(jit, { scaleY: .68, scaleX: 1.3, duration: .14, transformOrigin: '50% 100%', ease: 'power2.out' })
    .to(jit, { scaleY: 1.12, scaleX: .92, duration: .18, ease: 'power2.inOut' })
    .to(jit, { scaleY: 1, scaleX: 1, duration: .5, ease: 'elastic.out(1.2,0.4)' });
});
/* clay shyly leans away from the cursor */
window.addEventListener('pointermove', e => {
  const nx = (e.clientX / innerWidth - .5), ny = (e.clientY / innerHeight - .5);
  gsap.to(clay, { rotation: nx * -5, duration: .5, overwrite: 'auto' });
});

tl.progress(0);
</script>
